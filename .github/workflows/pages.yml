name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install documentation dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare static site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/app_maker_ecore _site/update-site
          cp site/index.html _site/index.html
          cp -R io.github.plortinus.model2blockly/examples/generated/app_maker_ecore/html/. _site/app_maker_ecore/
          npm run build:site-docs
          cp -R io.github.plortinus.model2blockly.updatesite/repository/. _site/update-site/
          cp io.github.plortinus.model2blockly.updatesite/category.xml _site/update-site/category.xml
          cp site/update-site/index.html _site/update-site/index.html
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload repository artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
